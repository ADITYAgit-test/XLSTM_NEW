version: '3.8'

services:
  xlstm-unet:
    build: .
    container_name: xlstm-unet-container
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=$DISPLAY
      - nnUNet_raw=/workspace/data/nnUNet_raw
      - nnUNet_preprocessed=/workspace/data/nnUNet_preprocessed
      - nnUNet_results=/workspace/nnUNet_results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: sleep infinity